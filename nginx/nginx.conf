user nginx;
worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # Resolver = Docker's embedded DNS; needed for re-resolving the `api` service
  # name on every request so we round-robin across replicas instead of pinning
  # one container IP at startup. valid=10s = TTL.
  resolver 127.0.0.11 valid=10s ipv6=off;

  sendfile on;
  keepalive_timeout 65;
  proxy_http_version 1.1;

  server {
    listen 8080;

    # SPA dev server (Vite). In prod this would be S3+CloudFront, see ADR diagrams.
    location / {
      set $frontend_upstream http://frontend:5173;
      proxy_pass $frontend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # HMR uses websockets
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # SSE — buffering MUST be disabled so events flush immediately. Long read
    # timeout so the keep-alive (20s) doesn't drop the connection.
    # ADR-001 §7.2/§7.7.
    #
    # Why the rewrite: when proxy_pass uses a variable, nginx skips its usual
    # URI-substitution behavior. We must explicitly strip /api/ ourselves.
    location /api/stream {
      # `set` MUST precede `rewrite ... break;` — break stops the rewrite phase,
      # so a `set` after it would never execute and $api_upstream would be empty.
      set $api_upstream http://api:8000;
      rewrite ^/api/(.*)$ /$1 break;
      # Variable in proxy_pass forces nginx to re-resolve `api` via the resolver
      # above on every request, giving round-robin across replicas as their IPs
      # rotate. The cost: nginx skips its built-in URI substitution, so we have
      # to assemble the upstream URL by hand from $uri$is_args$args.
      proxy_pass $api_upstream$uri$is_args$args;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 1h;
      proxy_send_timeout 1h;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Cookie $http_cookie;
      chunked_transfer_encoding off;
      add_header X-Accel-Buffering no;
    }

    # Regular API — see the SSE block for why the proxy_pass uses a variable
    # with $uri$is_args$args.
    location /api/ {
      set $api_upstream http://api:8000;
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass $api_upstream$uri$is_args$args;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Cookie $http_cookie;
    }
  }
}

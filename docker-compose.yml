# Local development topology, matches ADR-001 Diagram A.
# Component shapes mirror the AWS production diagram; only endpoints differ.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fleet
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - fleet-net

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 20
    networks:
      - fleet-net

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/fleet
      REDIS_URL: redis://redis:6379/0
      FLEET_CHANNEL: fleet:events
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # No host port — nginx is the only ingress. Multiple replicas can share
    # the service name `api` because Docker DNS rotates A records.
    deploy:
      replicas: 3
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
    networks:
      - fleet-net

  migrate:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/fleet
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
    networks:
      - fleet-net
    restart: "no"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_TARGET: http://nginx:8080
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
    networks:
      - fleet-net

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - fleet-net

volumes:
  pgdata:

networks:
  fleet-net:
    driver: bridge
